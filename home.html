<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskDrop</title>

<style>
body { margin:0; font-family:system-ui; background:#eef2ff; }

header {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px; background:#4a63e7; color:white;
}

nav a {
  margin:0 6px; color:white; text-decoration:none; font-size:14px;
}

.hero {
  text-align:center; padding:30px 15px;
}
.hero h2 {
  font-size:50px;}
.container {
  display:flex; justify-content:center; gap:15px;
  flex-wrap:wrap; margin-top:20px;
}

.card {
  width:140px; padding:18px;
  background:white; border-radius:12px;
  text-align:center; cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.input-box {
  margin:20px auto;
  max-width:300px;
  display:flex;
}

.input-box input {
  flex:1; padding:10px;
  border:1px solid #ccc; border-radius:8px 0 0 8px;
}

.input-box button {
  padding:10px;
  border:none;
  background:#4a63e7; color:white;
  border-radius:0 8px 8px 0;
}

footer {
  position:fixed; bottom:0; width:100%;
  text-align:center; padding:10px;
  background:#ddd;
}
</style>
</head>

<body>

<header>
  <b>TaskDrop</b>
  <nav>
    <a href="#">Tasks</a>
    <a href="#">About</a>
    <a href="signup.html">Signup</a>
  </nav>
</header>

<div class="hero">
  <h2>Drop tasks. Stay focused.</h2>
</div>

<div class="container">
  <div class="card" onclick="go()">Login</div>
  <div class="card" onclick="go()">Signup</div>
</div>

<footer>© 2026 TaskDrop</footer>

<script>
function go() {
  window.location.href = "signup.html";
}
</script>

</body>
</html>
